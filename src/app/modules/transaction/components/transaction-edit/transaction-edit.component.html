<div class="flex align-items-center gap-2 mb-3">
    <h2><app-back-button [path]="'/transactions'" />Editar Transacción</h2>
</div>

<div class="grid">
    <div class="col-12 md:col-6 mb-4">
        <p-card class="border-round shadow-2">

            <ng-container *ngIf="!loading && transaction">
                <app-transaction-form
                    [transaction]="transaction"
                    [submitLabel]="'Actualizar Transacción'"
                    [submitting]="submitting"
                    (onSubmit)="update($event)">
                </app-transaction-form>
            </ng-container>

        </p-card>
    </div>
</div>

<app-loader-dialog></app-loader-dialog>
