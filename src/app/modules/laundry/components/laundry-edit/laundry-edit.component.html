<!-- parent.component.html -->
<div class="flex align-items-center gap-2 pt-4 pb-4">
  <h2>
    <app-back-button [fallbackRoute]="'/laundry'" />
    Editar Servicio
  </h2>
</div>

<div class="grid">
  <div class="col-12 md:col-6 mb-4">
    <!-- Formulario de edición existente -->
    <p-card class="border-round shadow-2">
      <ng-container *ngIf="!loading && initialData">
        <app-laundry-form
          [initialData]="initialData"
          [transactionPrefill]="transactionPrefill"
          [isEditMode]="true"
          (formSubmit)="onFormSubmit($event)">
        </app-laundry-form>
      </ng-container>
    </p-card>
  </div>
</div>

<app-loader-dialog></app-loader-dialog>
