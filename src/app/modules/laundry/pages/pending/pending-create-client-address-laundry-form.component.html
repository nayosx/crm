<form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3 pt-2">
  <div class="flex flex-column gap-2">
    <label class="font-medium">Cliente</label>
    <input pInputText type="text" formControlName="client_name" placeholder="Nombre del cliente" [disabled]="saving" />
    <small *ngIf="form.get('client_name')?.invalid && form.get('client_name')?.touched" class="p-error">
      Debes ingresar el nombre del cliente.
    </small>
  </div>

  <div class="flex flex-column gap-2">
    <label class="font-medium">Dirección</label>
    <textarea
      pInputTextarea
      rows="3"
      formControlName="address_text"
      placeholder="Col. Centro, casa 123"
      [disabled]="saving">
    </textarea>
    <small *ngIf="form.get('address_text')?.invalid && form.get('address_text')?.touched" class="p-error">
      Debes ingresar la dirección.
    </small>
  </div>

  <div class="flex align-items-center justify-content-between gap-2">
    <label class="font-medium">Servicio express</label>
    <p-toggleswitch formControlName="is_express" [disabled]="saving"></p-toggleswitch>
  </div>

  <div class="flex justify-content-end gap-2 mt-2">
    <button pButton type="button" label="Cancelar" severity="secondary" (click)="close()" [disabled]="saving"></button>
    <button pButton type="submit" label="Guardar" [loading]="saving" [disabled]="form.invalid || saving"></button>
  </div>
</form>

<p-dialog
  header="No se pudo guardar"
  [(visible)]="errorDialogVisible"
  [modal]="true"
  [style]="{ width: '30rem' }">
  <p class="m-0 mb-3">{{ errorDialogMessage }}</p>
  <div class="flex justify-content-end">
    <button pButton type="button" label="Cerrar" (click)="closeErrorDialog()"></button>
  </div>
</p-dialog>

<app-loader-dialog></app-loader-dialog>
