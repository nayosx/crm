<p-toast />

<section class="catalog-page">
  <p-toolbar>
    <ng-template pTemplate="start">
      <div>
        <h1 class="m-0">Catálogo de zonas delivery</h1>
        <p class="mt-2 mb-0 text-600">Configura zonas y cargos sugeridos para acelerar el cobro con delivery.</p>
      </div>
    </ng-template>
    <ng-template pTemplate="end">
      <button pButton type="button" icon="pi pi-plus" label="Nueva zona" (click)="openCreate()"></button>
    </ng-template>
  </p-toolbar>

  <p-table class="mt-4" [value]="zones()" [loading]="loading()" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Zona</th>
        <th>Código</th>
        <th>Precio base</th>
        <th>Activo</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-zone>
      <tr>
        <td>{{ zone.name }}</td>
        <td>{{ zone.code || '-' }}</td>
        <td>{{ defaultPrice(zone) | currency:'USD':'symbol':'1.2-2' }}</td>
        <td>{{ zone.is_active ? 'Activo' : 'Inactivo' }}</td>
        <td class="text-right">
          <button pButton type="button" size="small" label="Editar" (click)="openEdit(zone)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-drawer
    header="{{ editingId() ? 'Editar zona delivery' : 'Nueva zona delivery' }}"
    position="right"
    [modal]="true"
    [visible]="drawerVisible()"
    (visibleChange)="drawerVisible.set($event)"
  >
    <form class="drawer-form" [formGroup]="form">
      <div>
        <label class="field-label">Nombre</label>
        <input pInputText formControlName="name" class="w-full" />
      </div>
      <div>
        <label class="field-label">Código</label>
        <input pInputText formControlName="code" class="w-full" />
      </div>
      <div>
        <label class="field-label">Descripción</label>
        <textarea pTextarea formControlName="description" rows="4" class="w-full"></textarea>
      </div>
      <div>
        <label class="field-label">Etiqueta del precio base</label>
        <input pInputText formControlName="defaultPriceLabel" class="w-full" />
      </div>
      <div>
        <label class="field-label">Cargo delivery sugerido</label>
        <p-inputnumber formControlName="defaultPrice" mode="currency" currency="USD" styleClass="w-full" />
      </div>
      <div>
        <label class="field-label">Estado</label>
        <p-select [options]="[{label:'Activo', value:true},{label:'Inactivo', value:false}]" optionLabel="label" optionValue="value" formControlName="isActive" appendTo="body" styleClass="w-full" />
      </div>
      <button pButton type="button" label="Guardar" icon="pi pi-save" [loading]="saving()" (click)="save()"></button>
    </form>
  </p-drawer>
</section>
