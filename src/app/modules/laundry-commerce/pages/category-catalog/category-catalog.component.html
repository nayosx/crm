<p-toast />

<section class="catalog-page">
  <p-toolbar>
    <ng-template pTemplate="start">
      <div>
        <h1 class="m-0">Catálogo de categorías</h1>
        <p class="mt-2 mb-0 text-600">Organiza servicios comerciales por categoría operativa.</p>
      </div>
    </ng-template>
    <ng-template pTemplate="end">
      <button pButton type="button" icon="pi pi-plus" label="Nueva categoría" (click)="openCreate()"></button>
    </ng-template>
  </p-toolbar>

  <p-table class="mt-4" [value]="categories()" [loading]="loading()" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Código</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
      <tr>
        <td>{{ category.name }}</td>
        <td>{{ category.code || '-' }}</td>
        <td>{{ category.description || '-' }}</td>
        <td>{{ category.is_active ? 'Activo' : 'Inactivo' }}</td>
        <td class="text-right">
          <button pButton type="button" size="small" label="Editar" (click)="openEdit(category)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-drawer
    header="{{ editingId() ? 'Editar categoría' : 'Nueva categoría' }}"
    position="right"
    [modal]="true"
    [visible]="drawerVisible()"
    (visibleChange)="drawerVisible.set($event)"
    styleClass="catalog-drawer"
  >
    <form class="drawer-form" [formGroup]="form">
      <div>
        <label class="field-label">Nombre</label>
        <input pInputText formControlName="name" class="w-full" />
      </div>
      <div>
        <label class="field-label">Código</label>
        <input pInputText formControlName="code" class="w-full" />
      </div>
      <div>
        <label class="field-label">Descripción</label>
        <textarea pTextarea formControlName="description" rows="4" class="w-full"></textarea>
      </div>
      <div>
        <label class="field-label">Estado</label>
        <p-select [options]="statusOptions" optionLabel="label" optionValue="value" formControlName="isActive" styleClass="w-full" appendTo="body" />
      </div>
      <button pButton type="button" label="Guardar" icon="pi pi-save" [loading]="saving()" (click)="save()"></button>
    </form>
  </p-drawer>
</section>
