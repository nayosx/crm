<div [formGroup]="form">
<p-card [header]="'Item ' + (index + 1)">
  <div class="row-grid">
    <div class="field col-12 lg:col-4">
      <label class="field-label">Servicio</label>
      <app-service-selector
        [control]="form.controls.serviceId"
        [services]="services"
        (selected)="serviceSelected.emit($event)"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-2">
      <label class="field-label">Cantidad</label>
      <p-inputnumber
        formControlName="quantity"
        inputId="item-quantity-{{ index }}"
        [min]="1"
        mode="decimal"
        [useGrouping]="false"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-3">
      <label class="field-label">Precio sugerido</label>
      <p-inputnumber
        formControlName="suggestedUnitPrice"
        mode="currency"
        currency="USD"
        [readonly]="true"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-3">
      <label class="field-label">Precio final</label>
      <p-inputnumber
        formControlName="finalUnitPrice"
        mode="currency"
        currency="USD"
        [readonly]="!canEditFinalPrice"
        styleClass="w-full"
      />
    </div>
  </div>

  @if (form.controls.serviceType.value !== 'WEIGHT' && servicePriceOptions.length > 1) {
    <div class="field mt-3">
      <label class="field-label">Precio sugerido rápido</label>
      <p-select
        [options]="servicePriceOptions"
        optionLabel="label"
        optionValue="id"
        formControlName="selectedPriceOptionId"
        appendTo="body"
        styleClass="w-full"
        (onChange)="priceOptionSelected.emit($event.value)"
      />
    </div>
  }

  @if (form.controls.serviceType.value === 'WEIGHT') {
    <div class="row-grid mt-3">
      <div class="field col-12 md:col-4">
        <label class="field-label">Peso en libras</label>
        <p-inputnumber
          formControlName="weightLb"
          mode="decimal"
          [min]="0.1"
          [minFractionDigits]="2"
          [maxFractionDigits]="2"
          styleClass="w-full"
        />
      </div>

      <div class="field col-12 md:col-4">
        <label class="field-label">Precio recomendado</label>
        <p-inputnumber
          formControlName="recommendedUnitPrice"
          mode="currency"
          currency="USD"
          [readonly]="true"
          styleClass="w-full"
        />
      </div>

      <div class="field col-12 md:col-4 flex align-items-end">
        <button
          pButton
          type="button"
          icon="pi pi-calculator"
          label="Recalcular cotización"
          class="w-full"
          [loading]="quoteLoading"
          [disabled]="!form.controls.serviceId.value || !form.controls.weightLb.value"
          (click)="quoteRequested.emit()"
        ></button>
      </div>
    </div>

    <div class="mt-3">
      <app-weight-pricing-quote-card
        [quote]="form.controls.quote.value"
        [currentFinalPrice]="form.controls.finalUnitPrice.value"
      />
    </div>
  }

  <div class="row-grid mt-3">
    <div class="field col-12 md:col-4">
      <label class="field-label">Descuento por item</label>
      <p-inputnumber
        formControlName="discountAmount"
        mode="currency"
        currency="USD"
        [min]="0"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4">
      <label class="field-label">Subtotal</label>
      <p-inputnumber
        formControlName="subtotal"
        mode="currency"
        currency="USD"
        [readonly]="true"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4 flex align-items-end">
      <button
        pButton
        type="button"
        icon="pi pi-trash"
        label="Quitar item"
        severity="danger"
        outlined="true"
        class="w-full"
        (click)="removed.emit()"
      ></button>
    </div>
  </div>

  <div class="field mt-3">
    <label class="field-label">Observaciones</label>
    <textarea
      pTextarea
      formControlName="notes"
      rows="2"
      class="w-full"
    ></textarea>
  </div>

  @if (hasOverride) {
    <div class="field mt-3">
      <label class="field-label">Motivo del override</label>
      <input
        pInputText
        formControlName="overrideReason"
        class="w-full"
      />
    </div>

    <p-message severity="warn" styleClass="w-full mt-3">
      Precio recomendado y precio final difieren. El motivo es obligatorio.
    </p-message>
  }
</p-card>
</div>
