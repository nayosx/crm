<div [formGroup]="form">
<p-card [header]="'Extra ' + (index + 1)">
  <div class="row-grid">
    <div class="field col-12 lg:col-4">
      <label class="field-label">Extra</label>
      <app-extra-selector
        [control]="form.controls.extraId"
        [extras]="extras"
        (selected)="extraSelected.emit($event)"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-2">
      <label class="field-label">Cantidad</label>
      <p-inputnumber
        formControlName="quantity"
        [min]="1"
        [useGrouping]="false"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-2">
      <label class="field-label">Precio sugerido</label>
      <p-inputnumber
        formControlName="suggestedUnitPrice"
        mode="currency"
        currency="USD"
        [readonly]="true"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-2">
      <label class="field-label">Precio final</label>
      <p-inputnumber
        formControlName="finalUnitPrice"
        mode="currency"
        currency="USD"
        [readonly]="!form.controls.allowManualOverride.value"
        styleClass="w-full"
      />
    </div>

    <div class="field col-12 md:col-4 lg:col-2">
      <label class="field-label">Subtotal</label>
      <p-inputnumber
        formControlName="subtotal"
        mode="currency"
        currency="USD"
        [readonly]="true"
        styleClass="w-full"
      />
    </div>
  </div>

  <div class="flex justify-content-end mt-3">
    <button
      pButton
      type="button"
      icon="pi pi-trash"
      label="Quitar extra"
      severity="danger"
      outlined="true"
      (click)="removed.emit()"
    ></button>
  </div>
</p-card>
</div>
