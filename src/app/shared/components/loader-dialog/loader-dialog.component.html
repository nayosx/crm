@if (display) {
  <p-dialog
    [visible]="true"
    [modal]="true"
    [closable]="false"
    [dismissableMask]="false"
    [showHeader]="false"
    [baseZIndex]="10000"
    appendTo="body"
    contentStyleClass="flex justify-content-center align-items-center"
    [style]="{ width: '300px', height: '200px' }"
    (onHide)="close()"
  >
    <app-loader-text [text]="textToShow"></app-loader-text>
  </p-dialog>
}
